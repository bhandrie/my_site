<!DOCTYPE html>
<html>
<head>
    <title>Products Table</title>
    <style>
        table {
            border-collapse: collapse;
            width: 50%;
            margin: 20px auto;
        }
        th, td {
            border: 1px solid #333;
            padding: 8px 12px;
            text-align: center;
        }
        th {
            background-color: #555;
            color: #fff;
        }
        tr:nth-child(even) {
            background-color: #eee;
        }
        h1 {
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Products List</h1>
    {% if products %}
        <table>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Price (€)</th>
            </tr>
            {% for product in products %}
                <tr>
                    <td>{{ product[0] }}</td>
                    <td>{{ product[1] }}</td>
                    <td>{{ product[2] }}</td>
                </tr>
            {% endfor %}
        </table>
    {% else %}
        <p>No products found.</p>
    {% endif %}
</body>
</html>
