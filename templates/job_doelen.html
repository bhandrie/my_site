<!doctype html>
<html>
  <head>
    <title>Bullet Points</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="/static/main.css" />
  </head>
  <body>

    <h1>Tandarts projectjes</h1>




    <form method="POST">
      <label>
        <input type="text" name="job_doel" required />
      </label>

      <button type="submit">Add</button>
    </form>

    <ul>

      {% for rowid, job_doel in job_doelen %}


      <li>{{ job_doel }} <a href="{{ url_for('delete_job_doelen', index=rowid) }}">Delete</a></li>
      {% endfor %}
    </ul>

  </body>
</html>
